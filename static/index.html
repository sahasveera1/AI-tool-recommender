<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAVI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
      background: #f7f7f8;
    }
    h1 {
      margin-bottom: 8px;
    }
    .controls, .chat-box, .input-row {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    label {
      display: block;
      font-weight: 600;
      margin-top: 8px;
      margin-bottom: 4px;
    }
    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    button {
      cursor: pointer;
      margin-top: 12px;
    }
    .chat-box {
      min-height: 300px;
      white-space: normal;
    }
    .msg {
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 10px;
    }
    .user {
      background: #e8f0fe;
    }
    .assistant {
      background: #eef7ea;
    }
    .meta {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }
    .message-content {
      line-height: 1.55;
    }
    .message-content > *:first-child {
      margin-top: 0;
    }
    .message-content > *:last-child {
      margin-bottom: 0;
    }
    .message-content p,
    .message-content ul,
    .message-content ol,
    .message-content pre,
    .message-content blockquote {
      margin: 0 0 12px;
    }
    .message-content h1,
    .message-content h2,
    .message-content h3 {
      margin: 16px 0 8px;
      line-height: 1.25;
    }
    .message-content h1 {
      font-size: 22px;
    }
    .message-content h2 {
      font-size: 18px;
    }
    .message-content h3 {
      font-size: 16px;
    }
    .message-content ul,
    .message-content ol {
      padding-left: 20px;
    }
    .message-content li + li {
      margin-top: 4px;
    }
    .message-content code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      background: rgba(0, 0, 0, 0.06);
      border-radius: 6px;
      padding: 0.1em 0.35em;
      font-size: 0.95em;
    }
    .message-content pre {
      overflow-x: auto;
      background: #1f2430;
      color: #f5f7fa;
      border-radius: 10px;
      padding: 12px;
    }
    .message-content pre code {
      background: transparent;
      padding: 0;
      color: inherit;
    }
    .message-content blockquote {
      border-left: 4px solid #c7d2fe;
      padding-left: 12px;
      color: #4b5563;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
  </style>
</head>
<body>
  <h1>RAVI</h1>
  <p>Recommendation & AI for Vendor Intelligence. Demo UI</p>

  <div class="controls">
    <div class="row">
      <div>
        <label for="userId">User ID</label>
        <input id="userId" value="test_user_1" />
      </div>
      <div>
        <label for="chatId">Chat ID</label>
        <input id="chatId" placeholder="Create a new chat first" />
      </div>
    </div>
    <button id="newChatBtn">Create New Chat</button>
  </div>

  <div id="chatBox" class="chat-box"></div>

  <div class="input-row">
    <label for="message">Message</label>
    <textarea id="message" placeholder="Ask RAVI something..."></textarea>
    <button id="sendBtn">Send Message</button>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const userIdInput = document.getElementById("userId");
    const chatIdInput = document.getElementById("chatId");
    const messageInput = document.getElementById("message");
    const newChatBtn = document.getElementById("newChatBtn");
    const sendBtn = document.getElementById("sendBtn");

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderInlineMarkdown(text) {
      let html = escapeHtml(text);
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
      return html;
    }

    function renderMarkdown(text) {
      const lines = text.split("\n");
      const blocks = [];
      let paragraphLines = [];
      let listItems = [];
      let listType = null;
      let codeLines = [];
      let inCodeBlock = false;

      function flushParagraph() {
        if (!paragraphLines.length) return;
        blocks.push(`<p>${renderInlineMarkdown(paragraphLines.join(" "))}</p>`);
        paragraphLines = [];
      }

      function flushList() {
        if (!listItems.length) return;
        const tag = listType === "ol" ? "ol" : "ul";
        const items = listItems.map((item) => `<li>${renderInlineMarkdown(item)}</li>`).join("");
        blocks.push(`<${tag}>${items}</${tag}>`);
        listItems = [];
        listType = null;
      }

      function flushCodeBlock() {
        if (!codeLines.length) return;
        blocks.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
        codeLines = [];
      }

      for (const line of lines) {
        if (line.trim().startsWith("```")) {
          flushParagraph();
          flushList();
          if (inCodeBlock) {
            flushCodeBlock();
            inCodeBlock = false;
          } else {
            inCodeBlock = true;
          }
          continue;
        }

        if (inCodeBlock) {
          codeLines.push(line);
          continue;
        }

        if (!line.trim()) {
          flushParagraph();
          flushList();
          continue;
        }

        const headingMatch = line.match(/^(#{1,3})\s+(.*)$/);
        if (headingMatch) {
          flushParagraph();
          flushList();
          const level = headingMatch[1].length;
          blocks.push(`<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`);
          continue;
        }

        const unorderedMatch = line.match(/^[-*]\s+(.*)$/);
        if (unorderedMatch) {
          flushParagraph();
          if (listType && listType !== "ul") {
            flushList();
          }
          listType = "ul";
          listItems.push(unorderedMatch[1]);
          continue;
        }

        const orderedMatch = line.match(/^\d+\.\s+(.*)$/);
        if (orderedMatch) {
          flushParagraph();
          if (listType && listType !== "ol") {
            flushList();
          }
          listType = "ol";
          listItems.push(orderedMatch[1]);
          continue;
        }

        if (line.startsWith("> ")) {
          flushParagraph();
          flushList();
          blocks.push(`<blockquote>${renderInlineMarkdown(line.slice(2))}</blockquote>`);
          continue;
        }

        paragraphLines.push(line.trim());
      }

      flushParagraph();
      flushList();
      if (inCodeBlock) {
        flushCodeBlock();
      }

      return blocks.join("");
    }

    function addMessage(role, text) {
      const wrapper = document.createElement("div");
      wrapper.className = `msg ${role}`;

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = role === "user" ? "You" : "RAVI";

      const content = document.createElement("div");
      content.className = "message-content";
      content.innerHTML = role === "assistant" ? renderMarkdown(text) : escapeHtml(text);

      wrapper.appendChild(meta);
      wrapper.appendChild(content);
      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    newChatBtn.addEventListener("click", async () => {
      const res = await fetch("/api/chats", {
        method: "POST"
      });

      if (!res.ok) {
        alert("Failed to create chat");
        return;
      }

      const data = await res.json();
      chatIdInput.value = data.chat_id;
      chatBox.innerHTML = "";
      addMessage("assistant", `Started new chat: ${data.chat_id}`);
    });

    sendBtn.addEventListener("click", async () => {
      const user_id = userIdInput.value.trim();
      const chat_id = chatIdInput.value.trim();
      const message = messageInput.value.trim();

      if (!user_id || !chat_id || !message) {
        alert("Please fill in user ID, chat ID, and message.");
        return;
      }

      addMessage("user", message);
      messageInput.value = "";

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          user_id,
          chat_id,
          message
        })
      });

      if (!res.ok) {
        const errorText = await res.text();
        addMessage("assistant", `Error: ${errorText}`);
        return;
      }

      const data = await res.json();
      addMessage("assistant", data.response);
    });
  </script>
</body>
</html>
