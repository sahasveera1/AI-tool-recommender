/* ─── MARKDOWN ────────────────────────────────────────────────────────────── */
function parseMarkdown(text) {
  const lines = text.split('\n');
  const blocks = [];
  let paraLines = [], listItems = [], listType = null, codeLines = [], inCode = false;
  const flushPara = () => { if (paraLines.length) { blocks.push({ type: 'p', content: paraLines.join(' ') }); paraLines = []; } };
  const flushList = () => { if (listItems.length) { blocks.push({ type: listType, items: [...listItems] }); listItems = []; listType = null; } };
  const flushCode = () => { if (codeLines.length) { blocks.push({ type: 'code', content: codeLines.join('\n') }); codeLines = []; } };

  for (const line of lines) {
    if (line.trim().startsWith('```')) { flushPara(); flushList(); inCode ? (flushCode(), inCode = false) : (inCode = true); continue; }
    if (inCode) { codeLines.push(line); continue; }
    if (!line.trim()) { flushPara(); flushList(); continue; }
    const hm = line.match(/^(#{1,3})\s+(.*)$/);
    if (hm) { flushPara(); flushList(); blocks.push({ type: `h${hm[1].length}`, content: hm[2] }); continue; }
    const um = line.match(/^[-*]\s+(.*)$/);
    if (um) { flushPara(); if (listType && listType !== 'ul') flushList(); listType = 'ul'; listItems.push(um[1]); continue; }
    const om = line.match(/^\d+\.\s+(.*)$/);
    if (om) { flushPara(); if (listType && listType !== 'ol') flushList(); listType = 'ol'; listItems.push(om[1]); continue; }
    if (line.match(/^\|.*\|$/)) { flushPara(); flushList(); blocks.push({ type: 'tr', content: line }); continue; }
    paraLines.push(line.trim());
  }
  flushPara(); flushList(); if (inCode) flushCode();

  const out = []; let tableRows = [];
  for (const b of blocks) {
    if (b.type === 'tr') tableRows.push(b.content);
    else { if (tableRows.length) { out.push({ type: 'table', rows: [...tableRows] }); tableRows = []; } out.push(b); }
  }
  if (tableRows.length) out.push({ type: 'table', rows: tableRows });
  return out;
}

function Inline({ text }) {
  const matches = [];
  const patterns = [
    { re: /\*\*([^*]+)\*\*/g, render: (m, i) => <strong key={i}>{m[1]}</strong> },
    { re: /`([^`]+)`/g,       render: (m, i) => <code key={i} style={{ fontFamily: 'var(--mono)', fontSize: '0.87em', background: 'rgba(128,128,128,0.12)', padding: '1px 5px', borderRadius: 3 }}>{m[1]}</code> },
    { re: /\*([^*]+)\*/g,     render: (m, i) => <em key={i}>{m[1]}</em> },
  ];
  for (const { re, render } of patterns) {
    re.lastIndex = 0; let m;
    while ((m = re.exec(text)) !== null) matches.push({ index: m.index, end: m.index + m[0].length, m, render });
  }
  matches.sort((a, b) => a.index - b.index);
  let cursor = 0, key = 0; const out = [];
  for (const { index, end, m, render } of matches) {
    if (index < cursor) continue;
    if (index > cursor) out.push(text.slice(cursor, index));
    out.push(render(m, key++)); cursor = end;
  }
  if (cursor < text.length) out.push(text.slice(cursor));
  return <>{out}</>;
}

function MsgContent({ text, isUser }) {
  if (isUser) return <p style={{ margin: 0, lineHeight: 1.6 }}>{text}</p>;
  const blocks = parseMarkdown(text);
  return (
    <div style={{ lineHeight: 1.7 }}>
      {blocks.map((b, i) => {
        if (b.type === 'h1') return <h3 key={i} style={{ fontSize: 16, fontWeight: 600, margin: '14px 0 6px' }}><Inline text={b.content} /></h3>;
        if (b.type === 'h2') return <h4 key={i} style={{ fontSize: 15, fontWeight: 600, margin: '12px 0 5px' }}><Inline text={b.content} /></h4>;
        if (b.type === 'h3') return <h5 key={i} style={{ fontSize: 14, fontWeight: 600, margin: '10px 0 4px' }}><Inline text={b.content} /></h5>;
        if (b.type === 'p')  return <p key={i} style={{ margin: '0 0 9px' }}><Inline text={b.content} /></p>;
        if (b.type === 'ul') return <ul key={i} style={{ margin: '0 0 9px', paddingLeft: 18 }}>{b.items.map((it, j) => <li key={j} style={{ marginBottom: 3 }}><Inline text={it} /></li>)}</ul>;
        if (b.type === 'ol') return <ol key={i} style={{ margin: '0 0 9px', paddingLeft: 18 }}>{b.items.map((it, j) => <li key={j} style={{ marginBottom: 3 }}><Inline text={it} /></li>)}</ol>;
        if (b.type === 'code') return <pre key={i} style={{ fontFamily: 'var(--mono)', fontSize: 12, background: 'rgba(128,128,128,0.09)', padding: '10px 12px', borderRadius: 6, overflowX: 'auto', margin: '0 0 9px', lineHeight: 1.6 }}><code>{b.content}</code></pre>;
        if (b.type === 'table') {
          const rows = b.rows.filter(r => !r.match(/^\|[-| ]+\|$/));
          return (
            <div key={i} style={{ overflowX: 'auto', margin: '0 0 10px' }}>
              <table style={{ borderCollapse: 'collapse', fontSize: 13, width: '100%' }}>
                <tbody>{rows.map((row, ri) => {
                  const cells = row.split('|').filter(c => c.trim());
                  const Tag = ri === 0 ? 'th' : 'td';
                  return <tr key={ri}>{cells.map((c, ci) => <Tag key={ci} style={{ padding: '6px 11px', border: '1px solid var(--border-strong)', fontWeight: ri === 0 ? 600 : 400, textAlign: 'left', fontSize: 13 }}>{c.trim()}</Tag>)}</tr>;
                })}</tbody>
              </table>
            </div>
          );
        }
        return null;
      })}
    </div>
  );
}

    setMessages(prev => ({ ...prev, [id]: [] }));

  const deleteChat = (chatId, e) => {
    e.stopPropagation();
    const next = chats.filter(c => c.id !== chatId);
    setChats(next);
    setMessages(prev => { const n = { ...prev }; delete n[chatId]; return n; });
    if (activeChatId === chatId) setActiveChatId(next[0]?.id || null);
  };

  const activeChat     = chats.find(c => c.id === activeChatId) || null;
  const activeMessages = activeChatId ? (messages[activeChatId] || []) : [];

  const sendMessage = async () => {
    if (!input.trim() || isLoading || !activeChatId) return;
    const chatId     = activeChatId;
    const currentTurn = turnCounts[chatId] || 0;
    const userMsg    = { role: 'user', content: input.trim(), id: Date.now() };
    const history    = messages[chatId] || [];

    setMessages(prev => ({ ...prev, [chatId]: [...(prev[chatId] || []), userMsg] }));
    if (currentTurn === 0) {
      const title = input.trim().slice(0, 42) + (input.trim().length > 42 ? '…' : '');
      setChats(prev => prev.map(c => c.id === chatId ? { ...c, title } : c));
    }
    setInput('');
    if (textareaRef.current) textareaRef.current.style.height = 'auto';
    setIsLoading(true);

    try {
      const response = await api.sendMessage({ message: input.trim(), userId, chatId, history, turnCount: currentTurn });
      const botMsg = { role: 'assistant', content: response, id: Date.now() + 1 };
      setMessages(prev => ({ ...prev, [chatId]: [...(prev[chatId] || []), botMsg] }));
      setTurnCounts(prev => ({ ...prev, [chatId]: currentTurn + 1 }));
    } catch (err) {
      const errMsg = { role: 'assistant', content: `Something went wrong: ${err.message}`, id: Date.now() + 1 };
      setMessages(prev => ({ ...prev, [chatId]: [...(prev[chatId] || []), errMsg] }));
    } finally {
      setIsLoading(false);
    }
  };

  const handleKeyDown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

  const copyUserId = () => {
    navigator.clipboard?.writeText(userId || '').then(() => { setCopiedUserId(true); setTimeout(() => setCopiedUserId(false), 1800); });
  };

  const sideBtn = { display: 'flex', alignItems: 'center', gap: 7, width: '100%', padding: '7px 10px', borderRadius: 6, border: '1px solid var(--border-strong)', background: 'transparent', color: 'var(--text-secondary)', fontFamily: 'var(--font)', fontSize: 13, cursor: 'pointer', transition: 'all var(--transition)' };

  const AmdBadge = ({ size = 'sm' }) => (
    <div style={{ background: 'var(--logo-bg)', borderRadius: 4, padding: size === 'sm' ? '3px 7px' : '4px 9px', display: 'inline-flex', alignItems: 'center', flexShrink: 0 }}>
      <span style={{ color: 'var(--logo-text)', fontWeight: 700, fontSize: size === 'sm' ? 10 : 13, letterSpacing: '-0.4px', fontFamily: 'var(--font)' }}>AMD</span>
    </div>
  );

  const BotAvatar = () => (
    <div style={{ width: 28, height: 28, borderRadius: 6, background: 'var(--logo-bg)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 2 }}>
      <span style={{ color: 'var(--logo-text)', fontWeight: 700, fontSize: 8, letterSpacing: '-0.3px' }}>AMD</span>
    </div>
  );

  return (
    <>
      {showModal && <UserModal onSave={handleSetUser} />}
      <div style={{ display: 'flex', height: '100vh', width: '100%', fontFamily: 'var(--font)' }}>

        {/* ── SIDEBAR ──────────────────────────────────────────────────── */}
        <div style={{ width: 252, minWidth: 252, height: '100vh', background: 'var(--bg-sidebar)', borderRight: '1px solid var(--border)', display: 'flex', flexDirection: 'column' }}>
          <div style={{ padding: '16px 14px 13px', borderBottom: '1px solid var(--border)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 9, marginBottom: 13 }}>
              <AmdBadge size="md" />
              <div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                  <span style={{ fontWeight: 600, fontSize: 14, color: 'var(--text-primary)', letterSpacing: '-0.2px' }}>Compass</span>
                  <span style={{ color: 'var(--text-muted)' }}><CompassIcon /></span>
                </div>
                <div style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 0.5 }}>AI Tool Advisor</div>
              </div>
            </div>
            <button
              onClick={createNewChat}
              style={{ ...sideBtn, justifyContent: 'center', color: 'var(--text-primary)', fontWeight: 500 }}
              onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-item-hover)'}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
            ><PlusIcon /> New conversation</button>
          </div>

          <div style={{ flex: 1, overflowY: 'auto', padding: '6px' }}>
            {chats.length === 0
              ? <p style={{ fontSize: 12, color: 'var(--text-muted)', textAlign: 'center', marginTop: 24, lineHeight: 1.5 }}>No conversations yet.<br />Start one above.</p>
              : chats.map(chat => (
                <div key={chat.id} onClick={() => setActiveChatId(chat.id)}
                  style={{ padding: '7px 9px', borderRadius: 6, marginBottom: 1, cursor: 'pointer', background: activeChatId === chat.id ? 'var(--bg-item-active)' : 'transparent', display: 'flex', alignItems: 'center', gap: 7, transition: 'background var(--transition)' }}
                  onMouseEnter={e => { if (activeChatId !== chat.id) e.currentTarget.style.background = 'var(--bg-item-hover)'; const b = e.currentTarget.querySelector('.del'); if (b) b.style.opacity = '1'; }}
                  onMouseLeave={e => { if (activeChatId !== chat.id) e.currentTarget.style.background = 'transparent'; const b = e.currentTarget.querySelector('.del'); if (b) b.style.opacity = '0'; }}
                >
                  <span style={{ color: 'var(--text-muted)', flexShrink: 0 }}><ChatIcon /></span>
                  <span style={{ fontSize: 12.5, color: activeChatId === chat.id ? 'var(--text-primary)' : 'var(--text-secondary)', fontWeight: activeChatId === chat.id ? 500 : 400, flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{chat.title}</span>
                  <button className="del" onClick={e => deleteChat(chat.id, e)}
                    style={{ opacity: 0, background: 'transparent', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', padding: '2px', borderRadius: 3, flexShrink: 0, display: 'flex', alignItems: 'center', transition: 'opacity 0.1s' }}>
                    <TrashIcon />
                  </button>
                </div>
              ))
            }
          </div>

          <div style={{ padding: '10px 10px 14px', borderTop: '1px solid var(--border)', display: 'flex', flexDirection: 'column', gap: 5 }}>
            {userId && (
              <div onClick={copyUserId} title="Click to copy your user ID"
                style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '6px 9px', borderRadius: 6, border: '1px solid var(--border)', cursor: 'pointer', transition: 'background var(--transition)' }}
                onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-item-hover)'}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
              >
                <span style={{ color: 'var(--text-muted)', flexShrink: 0 }}><UserIcon /></span>
                <span style={{ fontSize: 11.5, color: 'var(--text-muted)', flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{userId}</span>
                <span style={{ color: 'var(--text-muted)', flexShrink: 0 }}>{copiedUserId ? <span style={{ fontSize: 11 }}>✓</span> : <CopyIcon />}</span>
              </div>
            )}
            <button onClick={() => setTheme(t => t === 'light' ? 'dark' : 'light')} style={sideBtn}
              onMouseEnter={e => { e.currentTarget.style.background = 'var(--bg-item-hover)'; e.currentTarget.style.color = 'var(--text-primary)'; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--text-secondary)'; }}
            >
              {theme === 'light' ? <MoonIcon /> : <SunIcon />}
              {theme === 'light' ? 'Dark mode' : 'Light mode'}
            </button>
          </div>
        </div>

        {/* ── MAIN ─────────────────────────────────────────────────────── */}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden', minWidth: 0 }}>

          {/* Header */}
          <div style={{ padding: '12px 24px', borderBottom: '1px solid var(--border)', background: 'var(--bg-main)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
            <div>
              <div style={{ fontWeight: 600, fontSize: 14, color: 'var(--text-primary)', letterSpacing: '-0.1px' }}>
                {activeChat ? activeChat.title : 'AMD Compass'}
              </div>
              <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 1 }}>Guiding you to the right AI tool</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              {activeMessages.length > 0 && (
                <div ref={exportMenuRef} style={{ position: 'relative' }}>
                  <button onClick={() => setShowExportMenu(v => !v)}
                    style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '6px 10px', borderRadius: 6, border: '1px solid var(--border-strong)', background: 'transparent', color: 'var(--text-secondary)', fontFamily: 'var(--font)', fontSize: 12.5, cursor: 'pointer', transition: 'all var(--transition)' }}
                    onMouseEnter={e => { e.currentTarget.style.background = 'var(--bg-item-hover)'; e.currentTarget.style.color = 'var(--text-primary)'; }}
                    onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--text-secondary)'; }}
                  ><DownloadIcon /> Export</button>
                  {showExportMenu && (
                    <div style={{ position: 'absolute', right: 0, top: 'calc(100% + 6px)', background: 'var(--bg-input)', border: '1px solid var(--border-strong)', borderRadius: 8, boxShadow: 'var(--shadow-lg)', minWidth: 170, zIndex: 50, overflow: 'hidden', animation: 'fadeUp 0.15s ease' }}>
                      {[
                        { label: 'Download as .txt', action: () => { downloadTxt(activeChat, activeMessages); setShowExportMenu(false); } },
                        { label: 'Download as .json', action: () => { downloadJson(activeChat, activeMessages); setShowExportMenu(false); } },
                      ].map(({ label, action }) => (
                        <button key={label} onClick={action}
                          style={{ width: '100%', padding: '10px 14px', background: 'transparent', border: 'none', color: 'var(--text-primary)', fontFamily: 'var(--font)', fontSize: 13, textAlign: 'left', cursor: 'pointer', transition: 'background var(--transition)' }}
                          onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-item-hover)'}
                          onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                        >{label}</button>
                      ))}
                    </div>
                  )}
                </div>
              )}
              <div style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '4px 9px', borderRadius: 20, background: 'var(--tag-bg)', border: '1px solid var(--tag-border)' }}>
                <div style={{ width: 5, height: 5, borderRadius: '50%', background: 'var(--amd-red)' }} />
                <span style={{ fontSize: 10.5, fontWeight: 600, color: 'var(--amd-red)', letterSpacing: '0.05em' }}>MOCK</span>
              </div>
            </div>
          </div>

          {/* Messages */}
          <div style={{ flex: 1, overflowY: 'auto', padding: '24px 24px 8px' }}>
            {activeMessages.length === 0 ? (
              <div style={{ maxWidth: 540, margin: '44px auto 0', textAlign: 'center', animation: 'fadeUp 0.3s ease' }}>
                <div style={{ display: 'inline-flex', alignItems: 'center', gap: 10, marginBottom: 22, padding: '9px 16px', background: 'var(--bg-sidebar)', border: '1px solid var(--border)', borderRadius: 10 }}>
                  <AmdBadge size="sm" />
                  <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-primary)' }}>Compass</span>
                  <span style={{ color: 'var(--text-muted)' }}><CompassIcon /></span>
                  <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>AI Tool Advisor</span>
                </div>
                <h2 style={{ fontSize: 20, fontWeight: 600, color: 'var(--text-primary)', marginBottom: 8, letterSpacing: '-0.3px' }}>
                  Where do you need to go today?
                </h2>
                <p style={{ fontSize: 13.5, color: 'var(--text-secondary)', lineHeight: 1.65, marginBottom: 26 }}>
                  Describe what you're building and Compass will guide you to the right tool from AMD's vetted AI catalog.
                </p>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, textAlign: 'left' }}>
                  {STARTERS.map((p, i) => (
                    <button key={i} onClick={() => { setInput(p); textareaRef.current?.focus(); }}
                      style={{ padding: '11px 13px', borderRadius: 8, border: '1px solid var(--border-strong)', background: 'var(--bg-input)', color: 'var(--text-secondary)', fontFamily: 'var(--font)', fontSize: 12.5, cursor: 'pointer', textAlign: 'left', lineHeight: 1.5, transition: 'all var(--transition)' }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = 'rgba(0,0,0,0.28)'; e.currentTarget.style.color = 'var(--text-primary)'; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border-strong)'; e.currentTarget.style.color = 'var(--text-secondary)'; }}
                    >{p}</button>
                  ))}
                </div>
              </div>
            ) : (
              <div style={{ maxWidth: 720, margin: '0 auto' }}>
                {activeMessages.map(msg => (
                  <div key={msg.id} style={{ display: 'flex', marginBottom: 16, justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start', alignItems: 'flex-start', gap: 10, animation: 'fadeUp 0.2s ease' }}>
                    {msg.role === 'assistant' && <BotAvatar />}
                    <div style={{
                      maxWidth: msg.role === 'user' ? '66%' : '90%',
                      padding: '10px 14px',
                      borderRadius: msg.role === 'user' ? '11px 11px 3px 11px' : '3px 11px 11px 11px',
                      background: msg.role === 'user' ? 'var(--bg-user-msg)' : 'var(--bg-bot-msg)',
                      color: msg.role === 'user' ? 'var(--text-user-msg)' : 'var(--text-bot-msg)',
                      border: msg.role === 'assistant' ? '1px solid var(--border)' : 'none',
                      boxShadow: 'var(--shadow)', fontSize: 14, lineHeight: 1.65,
                    }}>
                      <MsgContent text={msg.content} isUser={msg.role === 'user'} />
                    </div>
                  </div>
                ))}
                {isLoading && (
                  <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10, marginBottom: 16 }}>
                    <BotAvatar />
                    <Thinking />
                  </div>
                )}
                <div ref={messagesEndRef} />
              </div>
            )}
          </div>

          {/* Input */}
          <div style={{ padding: '14px 24px 20px', flexShrink: 0 }}>
            <div style={{ maxWidth: 720, margin: '0 auto' }}>
              <div style={{ background: 'var(--bg-input)', border: '1px solid var(--border-strong)', borderRadius: 11, padding: '10px 12px', boxShadow: 'var(--shadow-lg)' }}>
                <textarea ref={textareaRef} value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKeyDown}
                  disabled={!activeChatId}
                  placeholder={activeChatId ? "Describe what you're building or the problem you need to solve..." : "Create a new conversation to get started"}
                  rows={1}
                  style={{ width: '100%', border: 'none', outline: 'none', resize: 'none', background: 'transparent', fontFamily: 'var(--font)', fontSize: 14, color: 'var(--text-primary)', lineHeight: 1.6, maxHeight: 130, overflowY: 'auto' }}
                  onInput={e => { e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 130) + 'px'; }}
                />
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 8 }}>
                  <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>Enter to send · Shift+Enter for new line</span>
                  <button onClick={sendMessage} disabled={!input.trim() || isLoading || !activeChatId}
                    style={{ width: 32, height: 32, borderRadius: 7, background: input.trim() && !isLoading && activeChatId ? 'var(--logo-bg)' : 'var(--border)', border: 'none', cursor: input.trim() && !isLoading && activeChatId ? 'pointer' : 'not-allowed', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--logo-text)', transition: 'background var(--transition)', flexShrink: 0 }}>
                    <SendIcon />
                  </button>
                </div>
              </div>
              <p style={{ fontSize: 11, color: 'var(--text-muted)', textAlign: 'center', marginTop: 7 }}>
                AMD Compass recommends only tools from AMD's vetted AI catalog
              </p>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
